<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Styles/LoginCss/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"rel="stylesheet">

</head>

<body>

    <div class="imagem-Login">
        <img src="Img/Logotipo-TCC__1_-removebg-preview.png" alt="Logo">
    </div>

    <main class="container">

        <form id="login-form">

            <h1>Login</h1>

            <div class="input-box">
                <input id="usuario" placeholder="Usuário (ex: joao.silva)" type="text" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input id="senha" placeholder="Senha (ex: IFBA.12345678900)" type="password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="Lembrar-me">
                <label>
                    <input type="checkbox"> Lembrar-me
                </label>
            </div>

            <button type="submit" class="login">Entrar</button>

            <p class="termos">
                Você concorda com os <br>
                Termos, Condições e Políticas de Privacidade da plataforma.
            </p>

        </form>
    </main>
 <script src="Scripts/db.js"></script>
    <script src="Scripts/login.js"></script>
   

</body>


</html>
